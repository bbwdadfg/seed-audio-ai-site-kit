<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#111827">
    <link rel="manifest" href="./manifest.webmanifest">
    <title>Seed Audio AI PWA Toolkit</title>
    <style>
      body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; color: #111827; background: #f8fafc; }
      main { max-width: 760px; margin: 0 auto; padding: 48px 20px; }
      h1 { font-size: 32px; margin: 0 0 12px; }
      p { line-height: 1.6; }
      code { background: #e5e7eb; padding: 2px 5px; border-radius: 4px; }
      a { color: #0f766e; }
      .panel { border: 1px solid #d1d5db; background: #fff; border-radius: 8px; padding: 18px; margin-top: 20px; }
    </style>
  </head>
  <body>
    <main>
      <h1>Seed Audio AI PWA Toolkit</h1>
      <p>Small installable helper for Seed Audio AI metadata, canonical URLs, and PWA deployment checks.</p>
      <div class="panel">
        <p><strong>Homepage:</strong> <a href="https://seedaud.io/">https://seedaud.io/</a></p>
        <p><strong>Text to Speech:</strong> <a href="https://seedaud.io/text-to-speech/">https://seedaud.io/text-to-speech/</a></p>
        <p><strong>Repository:</strong> <a href="https://github.com/bbwdadfg/seed-audio-ai-site-kit">bbwdadfg/seed-audio-ai-site-kit</a></p>
      </div>
      <div class="panel">
        <p>Service worker status: <code id="sw-status">checking</code></p>
      </div>
    </main>
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("./sw.js")
          .then(() => { document.getElementById("sw-status").textContent = "registered"; })
          .catch(() => { document.getElementById("sw-status").textContent = "unavailable"; });
      } else {
        document.getElementById("sw-status").textContent = "unsupported";
      }
    </script>
  </body>
</html>
